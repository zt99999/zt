name: Sync M3U to Gitee

on:
  schedule:
    # 每天 UTC 时间 00:00 运行（北京时间 08:00）
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download and process M3U
        run: |
          # 下载原始文件
          curl -sSL "https://raw.githubusercontent.com/Jsnzkpg/Jsnzkpg/Jsnzkpg/Jsnzkpg1.m3u" -o input.m3u
          
          # 去掉第二行，并过滤掉外国台
          # 保留第一行（文件头），然后从第 3 行开始过滤
          head -n 1 input.m3u > ln2.m3u
          
          # 过滤规则：删除包含外国台分组的行
          # 删除的分组包括：[外国]、[国际]、[Asia]、[USA]、[Korea]、[Japan]、[Thai] 等
          tail -n +3 input.m3u | grep -v "#EXTINF:-1 group-title=\"🌏外国" | \
          grep -v "#EXTINF:-1 group-title=\"🌍国际" | \
          grep -v "#EXTINF:-1 group-title=\"🇺🇸美国" | \
