name: Sync M3U to Gitee

on:
  push:
    paths:
      - 'ln2.m3u'
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'  # 每 6 小时
    - cron: '0 0 */2 * *'  # 每 2 天
    - cron: '0 0 * * 1'    # 每周一

jobs:
  sync-to-gitee:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Push to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          git clone https://gitee.com/zt192/source.git gitee-repo
          cd gitee-repo
          cp ../ln2.m3u .
          git add ln2.m3u
          git commit -m "Sync ln2.m3u from GitHub" || echo "No changes to commit"
          git remote set-url origin https://zt9615:$GITEE_TOKEN@gitee.com/zt192/source.git
          git push origin main --force
