      - name: Push to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          # 配置 git 和认证
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git config --global credential.helper '!f() { echo "username=zt192"; echo "password=${GITEE_TOKEN}"; }; f'
          
          # 克隆 Gitee 仓库
          git clone "https://gitee.com/zt192/sy.git" gitee-repo
          cd gitee-repo
          
          # 复制处理后的文件
          cp ../ln2.m3u .
          
          # 提交并推送
          git add ln2.m3u
          git commit -m "auto: sync m3u file $(date '+%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push origin master --force
