name: Sync M3U to Gitee

on:
  push:
    paths:
      - 'lm.m3u'
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'  # 每 6 小时
    - cron: '0 0 */2 * *'  # 每 2 天
    - cron: '0 0 * * 1'    # 每周一

jobs:
  sync-to-gitee:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Push to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          git clone https://gitee.com/zt192/source.git gitee-repo
          cd gitee-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp $GITHUB_WORKSPACE/lm.m3u .
          git add lm.m3u
          git commit -m "Sync lm.m3u from GitHub" || echo "No changes to commit"
          git remote set-url origin https://zt9615:$GITEE_TOKEN@gitee.com/zt192/source.git
          git push origin main --force
